<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>串口通信WebSocket测试客户端</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #569cd6;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .connection-panel {
            background-color: #252526;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #569cd6;
            margin-bottom: 20px;
        }
        
        .panel-title {
            color: #569cd6;
            margin: 0 0 15px 0;
            font-size: 16px;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #9cdcfe;
        }
        
        input, select, button {
            width: 100%;
            padding: 8px 12px;
            background-color: #3c3c3c;
            border: 1px solid #569cd6;
            color: #d4d4d4;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }
        
        button {
            background-color: #094771;
            color: #ffffff;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        
        button:hover {
            background-color: #0067c0;
        }
        
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        
        .status {
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .status.connected {
            background-color: #28a745;
            color: white;
        }
        
        .status.disconnected {
            background-color: #dc3545;
            color: white;
        }
        
        .status.connecting {
            background-color: #ffc107;
            color: black;
        }
        
        .data-panel {
            background-color: #252526;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #569cd6;
            margin-bottom: 20px;
        }
        
        .log-panel {
            background-color: #252526;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #569cd6;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid #569cd6;
            padding-left: 10px;
        }
        
        .log-entry.command {
            border-left-color: #ce9178;
        }
        
        .log-entry.response {
            border-left-color: #4ec9b0;
        }
        
        .log-entry.error {
            border-left-color: #f48771;
            color: #f48771;
        }
        
        .log-entry.system {
            border-left-color: #9cdcfe;
            color: #9cdcfe;
        }
        
        .command-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .command-button {
            background-color: #094771;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        
        .command-button:hover {
            background-color: #0067c0;
        }
        
        .command-button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .input-group input {
            flex: 1;
        }
        
        .input-group button {
            width: auto;
            min-width: 80px;
        }
        
        .port-list {
            height: 150px;
            overflow-y: auto;
            background-color: #3c3c3c;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
        }
        
        .port-item {
            padding: 5px;
            border-bottom: 1px solid #555;
        }
        
        .port-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>串口通信WebSocket测试客户端</h1>
        
        <div class="connection-panel">
            <h3 class="panel-title">WebSocket连接</h3>
            
            <div class="form-group">
                <label for="serverUrl">服务器地址:</label>
                <input type="text" id="serverUrl" value="ws://localhost:8080" placeholder="WebSocket服务器地址">
            </div>
            
            <div class="form-group">
                <button id="connectBtn" onclick="connectWebSocket()">连接</button>
                <button id="disconnectBtn" onclick="disconnectWebSocket()" disabled>断开</button>
            </div>
            
            <div id="connectionStatus" class="status disconnected">未连接</div>
        </div>
        
        <div class="data-panel">
            <h3 class="panel-title">串口控制命令</h3>
            
            <div class="command-buttons">
                <button class="command-button" onclick="sendCommand('list_ports', {})" :disabled="!isConnected">列出串口</button>
                <button class="command-button" onclick="sendCommand('set_hex_mode', {enabled: false})" :disabled="!isConnected">文本模式</button>
                <button class="command-button" onclick="sendCommand('set_hex_mode', {enabled: true})" :disabled="!isConnected">HEX模式</button>
                <button class="command-button" onclick="sendCommand('set_chart_mode', {enabled: true})" :disabled="!isConnected">开启图表</button>
                <button class="command-button" onclick="sendCommand('set_chart_mode', {enabled: false})" :disabled="!isConnected">关闭图表</button>
            </div>
            
            <div class="form-group">
                <label for="portSelect">选择串口:</label>
                <select id="portSelect">
                    <option value="">请选择串口</option>
                </select>
            </div>
            
            <div class="input-group">
                <input type="text" id="baudRate" value="9600" placeholder="波特率">
                <button onclick="connectToPort()">连接串口</button>
            </div>
            
            <div class="input-group">
                <input type="text" id="sendText" placeholder="输入要发送的文本">
                <button onclick="sendTextData()">发送文本</button>
            </div>
            
            <div class="input-group">
                <input type="text" id="sendHex" placeholder="输入HEX数据 (如: 48656C6C6F)">
                <button onclick="sendHexData()">发送HEX</button>
            </div>
            
            <div class="port-list" id="portList" style="display: none;">
                <div class="panel-title">可用串口:</div>
                <div id="portItems"></div>
            </div>
        </div>
        
        <div class="log-panel">
            <h3 class="panel-title">通信日志</h3>
            <div id="log"></div>
        </div>
    </div>

    <script>
        let ws = null;
        let isConnected = false;
        let availablePorts = [];

        function logMessage(message, type = 'system') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateConnectionStatus(status, message) {
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.className = `status ${status}`;
            statusDiv.textContent = message;
            
            document.getElementById('connectBtn').disabled = status === 'connected';
            document.getElementById('disconnectBtn').disabled = status !== 'connected';
        }

        function connectWebSocket() {
            const serverUrl = document.getElementById('serverUrl').value;
            
            try {
                ws = new WebSocket(serverUrl);
                
                ws.onopen = function(event) {
                    isConnected = true;
                    updateConnectionStatus('connected', '已连接到WebSocket服务器');
                    logMessage('WebSocket连接已建立', 'system');
                };
                
                ws.onmessage = function(event) {
                    try {
                        const response = JSON.parse(event.data);
                        logMessage(`收到响应: ${JSON.stringify(response, null, 2)}`, 'response');
                        
                        // 处理端口列表响应
                        if (response.type === 'command_response' && response.data.ports) {
                            availablePorts = response.data.ports;
                            updatePortList();
                        }
                        
                        // 处理端口状态响应
                        if (response.type === 'port_status') {
                            updatePortStatus(response.data);
                        }
                        
                        // 处理错误响应
                        if (response.type === 'error') {
                            logMessage(`错误: ${response.data.error}`, 'error');
                        }
                    } catch (e) {
                        logMessage(`收到数据: ${event.data}`, 'response');
                    }
                };
                
                ws.onclose = function(event) {
                    isConnected = false;
                    updateConnectionStatus('disconnected', 'WebSocket连接已断开');
                    logMessage('WebSocket连接已关闭', 'system');
                };
                
                ws.onerror = function(error) {
                    logMessage(`WebSocket错误: ${error}`, 'error');
                };
            } catch (e) {
                logMessage(`连接失败: ${e}`, 'error');
            }
        }

        function disconnectWebSocket() {
            if (ws) {
                ws.close();
                ws = null;
                isConnected = false;
            }
        }

        function sendCommand(command, data) {
            if (!isConnected || !ws) {
                logMessage('请先连接WebSocket服务器', 'error');
                return;
            }
            
            const message = {
                command: command,
                data: data
            };
            
            try {
                ws.send(JSON.stringify(message));
                logMessage(`发送命令: ${JSON.stringify(message)}`, 'command');
            } catch (e) {
                logMessage(`发送失败: ${e}`, 'error');
            }
        }

        function connectToPort() {
            const port = document.getElementById('portSelect').value;
            const baudRate = parseInt(document.getElementById('baudRate').value) || 9600;
            
            if (!port) {
                logMessage('请选择串口', 'error');
                return;
            }
            
            sendCommand('connect', {
                port: port,
                baudRate: baudRate
            });
        }

        function sendTextData() {
            const text = document.getElementById('sendText').value;
            if (!text) {
                logMessage('请输入要发送的文本', 'error');
                return;
            }
            
            sendCommand('send_text', {
                message: text
            });
            
            document.getElementById('sendText').value = '';
        }

        function sendHexData() {
            const hex = document.getElementById('sendHex').value;
            if (!hex) {
                logMessage('请输入HEX数据', 'error');
                return;
            }
            
            sendCommand('send_hex', {
                hex: hex
            });
            
            document.getElementById('sendHex').value = '';
        }

        function updatePortList() {
            const portItemsDiv = document.getElementById('portItems');
            portItemsDiv.innerHTML = '';
            
            const portSelect = document.getElementById('portSelect');
            portSelect.innerHTML = '<option value="">请选择串口</option>';
            
            if (availablePorts.length > 0) {
                availablePorts.forEach(port => {
                    const option = document.createElement('option');
                    option.value = port;
                    option.textContent = port;
                    portSelect.appendChild(option);
                    
                    const portItem = document.createElement('div');
                    portItem.className = 'port-item';
                    portItem.textContent = port;
                    portItemsDiv.appendChild(portItem);
                });
                
                document.getElementById('portList').style.display = 'block';
            } else {
                const noPorts = document.createElement('div');
                noPorts.textContent = '未找到可用串口';
                portItemsDiv.appendChild(noPorts);
            }
        }

        function updatePortStatus(status) {
            const portSelect = document.getElementById('portSelect');
            if (status.port) {
                portSelect.value = status.port;
            }
            
            document.getElementById('baudRate').value = status.baudRate || 9600;
        }

        // 页面加载时自动连接到默认服务器
        window.onload = function() {
            logMessage('WebSocket测试客户端已加载', 'system');
        };
    </script>
</body>
</html>
